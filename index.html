<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#020617,#020617,#0f172a);
color:white
}

header{
text-align:center;
font-size:48px;
padding:20px;
font-weight:bold;
background:linear-gradient(90deg,#d9d9d9,#ffffff,#9ca3af,#e5e7eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:2px
}

.container{
max-width:1100px;
margin:auto;
padding:10px
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin:6px 0;
background:#111827;
color:white
}

table{
width:100%;
border-collapse:collapse;
background:#020617;
border-radius:10px;
overflow:hidden
}

th{
background:#111827;
padding:10px;
font-size:18px
}

td{
padding:8px;
text-align:center
}

tr:nth-child(even){
background:#0f172a
}

tr:hover{
background:#1f2937
}

button{
padding:8px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
margin:4px;
cursor:pointer
}

.admin{
background:#020617;
padding:10px;
margin-top:10px;
border:1px solid #111827
}

.tier-HT1{color:#ff3b3b;font-weight:bold}
.tier-HT2{color:#ff9d00}
.tier-LT1{color:#22d3ee}
.tier-LT2{color:#4ade80}
.tier-NT{color:#9ca3af}

img.skin{
width:26px;
height:26px
}

footer{
text-align:center;
margin-top:20px;
opacity:.5
}
</style>
</head>

<body>

<header>ChromeTiers</header>

<div class="container">

<input id="search" placeholder="Search player...">

<table id="board"></table>

<div class="admin">
<h3>Admin Panel</h3>

<input id="name" placeholder="Player name">
<input id="tier" placeholder="Tier (HT1, HT2, LT1, LT2)">
<button id="addBtn">Add Player</button>

</div>

</div>

<footer>ChromeTiers Leaderboard</footer>

<script>

document.addEventListener("DOMContentLoaded", function(){

let players = [
{name:"Chromeheartz", tier:"HT1"},
{name:"SwordMain", tier:"HT2"},
{name:"CrystalPvper", tier:"LT1"}
];

function skin(name){
return "https://mc-heads.net/avatar/" + name;
}

function render(){

let table = document.getElementById("board");

let html = `
<tr>
<th>#</th>
<th>Skin</th>
<th>Name</th>
<th>Tier</th>
</tr>
`;

players.forEach((p,i)=>{

html += `
<tr>
<td>${i+1}</td>
<td><img class="skin" src="${skin(p.name)}"></td>
<td>${p.name}</td>
<td class="tier-${p.tier}">${p.tier}</td>
</tr>
`;

});

table.innerHTML = html;

}

function addPlayer(){

let n = document.getElementById("name").value;
let t = document.getElementById("tier").value;

if(!n || !t) return;

players.push({name:n, tier:t});

render();

}

function searchPlayer(){

let s = document.getElementById("search").value.toLowerCase();
let rows = document.querySelectorAll("#board tr");

for(let i=1;i<rows.length;i++){

let name = rows[i].children[2].textContent.toLowerCase();

rows[i].style.display =
name.includes(s) ? "" : "none";

}

}

document.getElementById("addBtn").onclick = addPlayer;
document.getElementById("search").onkeyup = searchPlayer;

render();

});

</script>

</body>
</html>
