<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* NAVBAR */
.nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 20px;
background:#0f172a;
border-bottom:1px solid #1e293b;
}

.logo{
font-weight:bold;
font-size:20px;
color:#facc15;
}

.nav-links{
display:flex;
gap:20px;
align-items:center;
}

.nav-links span{
opacity:.7;
cursor:pointer;
}

.search{
background:#020617;
border:1px solid #1e293b;
padding:6px 10px;
border-radius:8px;
color:white;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
padding:15px;
}

.tab{
padding:10px 15px;
border-radius:10px;
background:#020617;
border:1px solid #1e293b;
cursor:pointer;
}

.tab.active{
background:#1d4ed8;
}

/* LIST */
.container{
max-width:1100px;
margin:auto;
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px;
margin:8px 0;
background:#0f172a;
border-radius:12px;
border:1px solid #1e293b;
}

/* LEFT SIDE */
.left{
display:flex;
align-items:center;
gap:15px;
}

.rank{
font-size:22px;
font-weight:bold;
color:#facc15;
}

.player{
display:flex;
align-items:center;
gap:10px;
}

.name{
font-size:18px;
font-weight:bold;
}

/* REGION */
.region{
background:#111827;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

/* MODES */
.modes{
display:flex;
gap:10px;
}

.mode{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
}

.icon{
width:30px;
height:30px;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
background:#020617;
}

.tier{
font-weight:bold;
color:#facc15;
}

img{
border-radius:6px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">

<div class="logo">ChromeTiers</div>

<div class="nav-links">
<span>Home</span>
<span style="opacity:1;">🏆 Rankings</span>
<span>🎮 Discords</span>
<span style="color:#60a5fa;">Admin Panel</span>
</div>

<input class="search" placeholder="Search player...">

</div>

<!-- TABS -->
<div class="tabs">
<div class="tab active">🏆 Overall</div>
<div class="tab">⚔ LTMs</div>
<div class="tab">𖢻 Vanilla</div>
<div class="tab">❤️ UHC</div>
<div class="tab">💎 Pot</div>
<div class="tab">💀 NethOP</div>
<div class="tab">🛡️ SMP</div>
<div class="tab">🗡 Sword</div>
<div class="tab">🪓 Axe</div>
<div class="tab">🔨 Mace</div>
</div>

<div class="container" id="list"></div>

<script>

const modes = [
"🔮","🗡","🪓","🛡️","❤️","🧪","♟️","💎"
];

let players = [
{name:"ChromeKing",region:"NA",tiers:["HT1","HT1","LT1","HT1","HT1","HT1","LT1","LT1"]},
{name:"SkyPvP",region:"NA",tiers:["HT2","LT1","HT2","HT1","LT1","HT2","HT1","LT1"]},
{name:"Coldified",region:"EU",tiers:["LT1","LT1","LT1","HT2","HT2","LT3","HT1","LT2"]},
{name:"Swight",region:"NA",tiers:["HT1","HT1","LT2","LT2","HT3","HT3","HT1","LT2"]}
];

const list = document.getElementById("list");

function render(){

list.innerHTML="";

players.forEach((p,i)=>{

let modesHTML = modes.map((icon,index)=>`
<div class="mode">
<div class="icon">${icon}</div>
<div class="tier">${p.tiers[index]}</div>
</div>
`).join("");

let row = document.createElement("div");

row.className="row";

row.innerHTML=`
<div class="left">
<div class="rank">${i+1}.</div>

<div class="player">
<img src="https://mc-heads.net/avatar/${p.name}" width="36">
<div class="name">${p.name}</div>
</div>
</div>

<div class="region">${p.region}</div>

<div class="modes">${modesHTML}</div>
`;

list.appendChild(row);

});

}

render();

</script>

</body>
</html>
