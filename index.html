<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;}

/* NAV */
.nav{display:flex;align-items:center;padding:16px 25px;background:#0f172a;position:relative;}
.logo{font-size:24px;font-weight:bold;background:linear-gradient(90deg,#e5e7eb,#9ca3af);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:15px;}
.nav-right{margin-left:auto;}
.top-btn{padding:8px 12px;background:#1e293b;border-radius:8px;cursor:pointer;}
.search{padding:10px;border-radius:10px;border:1px solid #1e293b;background:#020617;color:white;}

/* TABS */
.tabs{display:flex;justify-content:center;gap:10px;padding:15px;flex-wrap:wrap;}
.tab{padding:10px 15px;background:#020617;border:1px solid #1e293b;border-radius:10px;cursor:pointer;}
.tab.active{background:#1e293b;}

/* LIST */
.container{max-width:1200px;margin:auto;}
.row{display:flex;align-items:center;padding:18px;margin:10px 0;background:#0f172a;border-radius:14px;}
.left{display:flex;align-items:center;gap:15px;}
.rank{font-size:24px;font-weight:bold;}
.player{display:flex;align-items:center;gap:12px;}
.modes{display:flex;gap:12px;margin-left:auto;}
.mode{display:flex;flex-direction:column;align-items:center;}
.icon{width:36px;height:36px;background:#020617;display:flex;align-items:center;justify-content:center;border-radius:8px;}
.tier{font-weight:bold;}

/* LOGIN + PANEL */
.popup,.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#020617;padding:20px;border-radius:12px;border:1px solid #1e293b;display:none;flex-direction:column;gap:10px;}
.popup{top:0;left:0;width:100%;height:100%;transform:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);}
input{padding:8px;background:#0f172a;border:1px solid #1e293b;color:white;border-radius:6px;}
button{padding:8px;background:#1e293b;border:none;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<div class="nav">
<div class="logo">ChromeTiers</div>

<div class="nav-center">
<div class="top-btn" onclick="openLogin()">Admin Panel</div>
</div>

<div class="nav-right">
<input class="search" placeholder="Search...">
</div>
</div>

<div class="tabs">
<div class="tab active" data-mode="overall">🏆 Overall</div>
<div class="tab" data-mode="0">🔮</div>
<div class="tab" data-mode="1">🗡</div>
<div class="tab" data-mode="2">🪓</div>
<div class="tab" data-mode="3">🛡️</div>
<div class="tab" data-mode="4">❤️</div>
<div class="tab" data-mode="5">🧪</div>
<div class="tab" data-mode="6">♟️</div>
<div class="tab" data-mode="7">💎</div>
</div>

<div class="container" id="list"></div>

<!-- LOGIN -->
<div class="popup" id="loginPopup">
<div>
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Enter</button>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="panel" id="panel">
<input id="name" placeholder="Player Name">
<input id="gamemode" placeholder="Gamemode (Axe, Sword...)">
<input id="tierInput" placeholder="Tier (HT1, LT1...)">

<button onclick="addPlayer()">Add Player</button>
<button onclick="removePlayer()">Remove Player</button>
<button onclick="updateTier()">Update Tier</button>
<button onclick="closePanel()">Close</button>
</div>

<script>

const PASSWORD="Iamthebestplayereverchromehearts";

/* MODE MAP */
const modeMap={
"vanilla":0,
"sword":1,
"axe":2,
"smp":3,
"uhc":4,
"pot":5,
"nethpot":6,
"diapot":7,
"mace":2
};

const modes=["🔮","🗡","🪓","🛡️","❤️","🧪","♟️","💎"];

let players=[
{name:"ChromeKing",tiers:["HT1","HT1","LT1","HT1","HT1","HT1","LT1","LT1"]}
];

let currentMode="overall";

const list=document.getElementById("list");

/* RENDER */
function render(){
list.innerHTML="";
players.forEach((p,i)=>{
let content=currentMode==="overall"
? p.tiers.map((t,index)=>`
<div class="mode"><div class="icon">${modes[index]}</div><div class="tier">${t}</div></div>`).join("")
: `<div class="mode"><div class="icon">${modes[currentMode]}</div><div class="tier">${p.tiers[currentMode]}</div></div>`;

list.innerHTML+=`
<div class="row">
<div class="left">
<div class="rank">${i+1}.</div>
<div class="player">${p.name}</div>
</div>
<div class="modes">${content}</div>
</div>`;
});
}
render();

/* TABS */
document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");
currentMode=tab.dataset.mode==="overall"?"overall":Number(tab.dataset.mode);
render();
};
});

/* LOGIN */
function openLogin(){loginPopup.style.display="flex";}
function login(){
if(password.value===PASSWORD){
loginPopup.style.display="none";
panel.style.display="flex";
}else alert("Wrong password");
}

/* ADMIN FIXED */
function addPlayer(){
let name=nameInput.value.trim();
if(!name)return;
players.push({name,tiers:["LT5","LT5","LT5","LT5","LT5","LT5","LT5","LT5"]});
render();
}

function removePlayer(){
let name=nameInput.value.trim();
players=players.filter(p=>p.name!==name);
render();
}

function updateTier(){
let name=nameInput.value.trim().toLowerCase();
let mode=gamemode.value.toLowerCase();
let tier=tierInput.value.toUpperCase();

let index=modeMap[mode];
let player=players.find(p=>p.name.toLowerCase()===name);

if(player && index!==undefined){
player.tiers[index]=tier;
render();
}
}

function closePanel(){panel.style.display="none";}

</script>

</body>
</html>
