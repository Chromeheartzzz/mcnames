<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 25px;
background:#0f172a;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:24px;
font-weight:bold;
background:linear-gradient(90deg,#e5e7eb,#9ca3af,#d1d5db);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.top-right{
display:flex;
align-items:center;
gap:15px;
}

.top-btn{
padding:8px 12px;
background:#1e293b;
border-radius:8px;
cursor:pointer;
}

.top-btn:hover{
background:#5865F2;
}

/* SEARCH */
.search{
padding:10px;
border-radius:10px;
border:1px solid #1e293b;
background:#020617;
color:white;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.tab{
padding:10px 15px;
background:#020617;
border:1px solid #1e293b;
border-radius:10px;
cursor:pointer;
}

.tab.active{
background:#1e293b;
}

/* LIST */
.container{
max-width:1200px;
margin:auto;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
margin:10px 0;
background:#0f172a;
border-radius:14px;
border:1px solid #1e293b;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.rank{
font-size:24px;
font-weight:bold;
background:linear-gradient(90deg,#e5e7eb,#9ca3af);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.player{
display:flex;
align-items:center;
gap:12px;
}

.name{
font-size:20px;
font-weight:bold;
transition:.2s;
}

.name:hover{
transform:scale(1.15);
}

.modes{
display:flex;
gap:10px;
}

.mode{
display:flex;
flex-direction:column;
align-items:center;
}

.icon{
width:36px;
height:36px;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
}

.tier{
background:linear-gradient(90deg,#e5e7eb,#9ca3af);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

/* ADMIN PANEL */
.panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
padding:20px;
border-radius:12px;
border:1px solid #1e293b;
display:none;
flex-direction:column;
gap:10px;
z-index:1000;
}

.panel input{
padding:8px;
background:#0f172a;
border:1px solid #1e293b;
color:white;
border-radius:6px;
}

.panel button{
padding:8px;
background:#1e293b;
border:none;
border-radius:6px;
cursor:pointer;
}

.panel button:hover{
background:#5865F2;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">ChromeTiers</div>

<div class="top-right">
<div class="top-btn" onclick="window.open('https://discord.gg/TUY9pZHD','_blank')">Discord</div>
<div class="top-btn" onclick="togglePanel()">Admin Panel</div>
<input class="search" placeholder="Search...">
</div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs">
<div class="tab active" data-mode="overall">🏆 Overall</div>
<div class="tab" data-mode="0">🔮</div>
<div class="tab" data-mode="1">🗡</div>
<div class="tab" data-mode="2">🪓</div>
<div class="tab" data-mode="3">🛡️</div>
<div class="tab" data-mode="4">❤️</div>
<div class="tab" data-mode="5">🧪</div>
<div class="tab" data-mode="6">♟️</div>
<div class="tab" data-mode="7">💎</div>
</div>

<div class="container" id="list"></div>

<!-- ADMIN PANEL -->
<div class="panel" id="panel">
<input id="name" placeholder="Player Name">

<input id="tiers" placeholder="Tiers (HT1,LT1,HT2...)">

<button onclick="addPlayer()">Add Player</button>
<button onclick="removePlayer()">Remove Player</button>
<button onclick="updatePlayer()">Update Tiers</button>
<button onclick="togglePanel()">Close</button>
</div>

<script>

const modes = ["🔮","🗡","🪓","🛡️","❤️","🧪","♟️","💎"];
let currentMode = "overall";

let players = [
{name:"ChromeKing",tiers:["HT1","HT1","LT1","HT1","HT1","HT1","LT1","LT1"]},
{name:"SkyPvP",tiers:["HT2","LT1","HT2","HT1","LT1","HT2","HT1","LT1"]}
];

const list = document.getElementById("list");
const search = document.querySelector(".search");

/* RENDER */
function render(filter=""){
list.innerHTML="";

let filtered = players.filter(p =>
p.name.toLowerCase().includes(filter.toLowerCase())
);

if(currentMode !== "overall"){
filtered.sort((a,b)=>{
return b.tiers[currentMode].localeCompare(a.tiers[currentMode]);
});
}

filtered.forEach((p,i)=>{

let content = currentMode === "overall"
? modes.map((icon,index)=>`
<div class="mode">
<div class="icon">${icon}</div>
<div class="tier">${p.tiers[index]}</div>
</div>`).join("")
: `<div class="mode">
<div class="icon">${modes[currentMode]}</div>
<div class="tier">${p.tiers[currentMode]}</div>
</div>`;

let row = document.createElement("div");
row.className="row";

row.innerHTML=`
<div class="left">
<div class="rank">${i+1}.</div>
<div class="player">
<img src="https://mc-heads.net/avatar/${p.name}" width="46">
<div class="name">${p.name}</div>
</div>
</div>

<div class="modes">${content}</div>
`;

list.appendChild(row);

});
}

render();

/* SEARCH */
search.addEventListener("input", e=> render(e.target.value));

/* TABS */
document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");

currentMode = tab.dataset.mode === "overall"
? "overall"
: Number(tab.dataset.mode);

render(search.value);
};
});

/* ADMIN PANEL */
function togglePanel(){
const p = document.getElementById("panel");
p.style.display = p.style.display === "flex" ? "none" : "flex";
}

function addPlayer(){
let name = document.getElementById("name").value;
let tiers = document.getElementById("tiers").value.split(",");

players.push({name,tiers});
render();
}

function removePlayer(){
let name = document.getElementById("name").value;
players = players.filter(p=>p.name !== name);
render();
}

function updatePlayer(){
let name = document.getElementById("name").value;
let tiers = document.getElementById("tiers").value.split(",");

let p = players.find(p=>p.name === name);
if(p) p.tiers = tiers;

render();
}

</script>

</body>
</html>
