<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */
header{
font-size:48px;
text-align:center;
padding:20px;
font-weight:bold;
background:linear-gradient(90deg,#d9d9d9,#ffffff,#9ca3af,#e5e7eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
border-bottom:1px solid #111827;
}

/* ADMIN */
.admin button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
margin-left:5px;
}

/* TABLE */
.container{
max-width:1100px;
margin:auto;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#111827;
padding:10px;
}

td{
padding:12px;
text-align:center;
}

tr:nth-child(even){
background:#0f172a;
}

tr:hover{
background:#1f2937;
cursor:pointer;
}

.selected{
outline:2px solid #2563eb;
}

/* ICON + TIER STACK */
.mode-cell{
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
}

.mode-box{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
}

.mode-icon{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:#111827;
font-size:16px;
}

/* CHROME TEXT */
.chrome{
background:linear-gradient(90deg,#d9d9d9,#ffffff,#9ca3af,#e5e7eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

img{
border-radius:6px;
}

</style>

</head>
<body>

<header>ChromeTiers</header>

<div class="topbar">

<div></div>

<div class="admin">
<button onclick="editSelected()">Edit Tier</button>
<button onclick="removeSelected()">Remove</button>
</div>

</div>

<div class="container">

<table>

<thead>
<tr>
<th>Player</th>
<th>Name</th>
<th>Gamemode Tiers</th>
</tr>
</thead>

<tbody id="leaderboardBody"></tbody>

</table>

</div>

<script>

// PASSWORD
const ADMIN_PASSWORD = "Chromepassword";

let selectedPlayer = null;

const modes = [
{key:"crystal",icon:"💎"},
{key:"smp",icon:"🛡"},
{key:"axe",icon:"🪓"},
{key:"sword",icon:"⚔"},
{key:"mace",icon:"🔨"},
{key:"uhc",icon:"❤️"},
{key:"netpot",icon:"🧪"},
{key:"diapot",icon:"💠"}
];

let players = [
{
name:"ChromeKing",
tiers:{crystal:"HT1",smp:"HT1",axe:"LT1",sword:"HT1",mace:"HT1",uhc:"HT1",netpot:"LT1",diapot:"LT1"}
},
{
name:"SkyPvP",
tiers:{crystal:"HT2",smp:"LT1",axe:"HT2",sword:"HT1",mace:"LT1",uhc:"HT2",netpot:"HT1",diapot:"LT1"}
}
];

const body = document.getElementById("leaderboardBody");

// RENDER
function render(){

body.innerHTML="";

players.forEach(p=>{

let row=document.createElement("tr");

row.onclick=()=>selectPlayer(p,row);

let modesHTML = modes.map(m=>`
<div class="mode-box">
<div class="mode-icon">${m.icon}</div>
<div class="chrome">${p.tiers[m.key] || "-"}</div>
</div>
`).join("");

row.innerHTML=`
<td><img src="https://mc-heads.net/avatar/${p.name}" width="32"></td>
<td>${p.name}</td>
<td><div class="mode-cell">${modesHTML}</div></td>
`;

body.appendChild(row);

});

}

// SELECT PLAYER
function selectPlayer(player,row){

selectedPlayer = player;

document.querySelectorAll("tr").forEach(r=>r.classList.remove("selected"));
row.classList.add("selected");

}

// EDIT
function editSelected(){

if(!selectedPlayer){
alert("Select a player first");
return;
}

let pass = prompt("Password");
if(pass !== ADMIN_PASSWORD){
alert("Wrong password");
return;
}

let mode = prompt("Gamemode (crystal, smp, axe, sword, mace, uhc, netpot, diapot)");
let tier = prompt("New tier");

if(!mode || !tier) return;

selectedPlayer.tiers[mode] = tier;

render();

}

// REMOVE
function removeSelected(){

if(!selectedPlayer){
alert("Select a player first");
return;
}

let pass = prompt("Password");
if(pass !== ADMIN_PASSWORD){
alert("Wrong password");
return;
}

players = players.filter(p => p !== selectedPlayer);
selectedPlayer = null;

render();

}

// INIT
render();

</script>

</body>
</html>
