<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b1220,#020617);
color:white;
}

/* HEADER */
header{
font-size:48px;
text-align:center;
padding:20px;
font-weight:bold;
background:linear-gradient(90deg,#d9d9d9,#ffffff,#9ca3af,#e5e7eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TABLE */
.container{
max-width:1000px;
margin:auto;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:10px;
}

th{
background:#1e293b;
padding:12px;
text-align:left;
font-size:14px;
}

td{
padding:14px;
}

/* ROW STYLE LIKE IMAGE */
tbody tr{
background:linear-gradient(90deg,#1e3a8a,#1d4ed8);
}

tbody tr:nth-child(even){
background:linear-gradient(90deg,#1e40af,#1e3a8a);
}

tr:hover{
filter:brightness(1.1);
}

/* PLAYER HEAD */
img{
border-radius:6px;
}

/* NAME FIX */
.name{
padding-left:20px; /* 👈 slight right shift like image */
font-size:20px;
font-weight:600;

background:linear-gradient(90deg,#ffffff,#d1d5db,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* ICON + TIER */
.mode-cell{
display:flex;
justify-content:center;
gap:14px;
}

.mode-box{
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
}

/* ICON STYLE */
.mode-icon{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:#111827;
font-size:16px;
}

/* TIER TEXT */
.tier-text{
font-size:14px;
font-weight:700;

background:linear-gradient(90deg,#ffffff,#d1d5db,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<header>ChromeTiers</header>

<div class="container">

<table>

<thead>
<tr>
<th>Player</th>
<th>Name</th>
<th style="text-align:center;">Gamemode Tiers</th>
</tr>
</thead>

<tbody id="leaderboardBody"></tbody>

</table>

</div>

<script>

const modes = [
{key:"crystal",icon:"🔮"},
{key:"smp",icon:"🛡️"},
{key:"axe",icon:"🪓"},
{key:"sword",icon:"🗡"},
{key:"mace",icon:"🔨"},
{key:"uhc",icon:"❤️"},
{key:"netpot",icon:"♟️"},
{key:"diapot",icon:"💎"}
];

let players = [
{
name:"ChromeKing",
tiers:{crystal:"HT1",smp:"HT1",axe:"LT1",sword:"HT1",mace:"HT1",uhc:"HT1",netpot:"LT1",diapot:"LT1"}
},
{
name:"SkyPvP",
tiers:{crystal:"HT2",smp:"LT1",axe:"HT2",sword:"HT1",mace:"LT1",uhc:"HT2",netpot:"HT1",diapot:"LT1"}
}
];

const body = document.getElementById("leaderboardBody");

function render(){

body.innerHTML="";

players.forEach(p=>{

let modesHTML = modes.map(m=>`
<div class="mode-box">
<div class="mode-icon">${m.icon}</div>
<div class="tier-text">${p.tiers[m.key]}</div>
</div>
`).join("");

let row=document.createElement("tr");

row.innerHTML=`
<td><img src="https://mc-heads.net/avatar/${p.name}" width="34"></td>
<td class="name">${p.name}</td>
<td><div class="mode-cell">${modesHTML}</div></td>
`;

body.appendChild(row);

});

}

render();

</script>

</body>
</html>
