<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */
header{
font-size:48px;
text-align:center;
padding:20px;
font-weight:bold;
background:linear-gradient(90deg,#d9d9d9,#ffffff,#9ca3af,#e5e7eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#020617;
border-bottom:1px solid #111827;
}

/* GAMEMODES */
.modes{
display:flex;
gap:10px;
}

.mode{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:#111827;
cursor:pointer;
transition:0.2s;
font-size:18px;
}

.mode.active{
background:#2563eb;
}

/* ADMIN PANEL */
.admin{
display:flex;
gap:10px;
}

.admin button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* TABLE */
.container{
max-width:1000px;
margin:auto;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#111827;
padding:10px;
}

td{
padding:10px;
text-align:center;
}

tr:nth-child(even){
background:#0f172a;
}

tr:hover{
background:#1f2937;
cursor:pointer;
}

.selected{
outline:2px solid #2563eb;
}

/* SKIN */
img{
border-radius:6px;
}

</style>

</head>
<body>

<header>ChromeTiers</header>

<div class="topbar">

<!-- GAMEMODE ICONS -->
<div class="modes">

<div class="mode active" onclick="setMode('crystal',this)">💎</div>
<div class="mode" onclick="setMode('smp',this)">🛡️</div>
<div class="mode" onclick="setMode('axe',this)">🪓</div>
<div class="mode" onclick="setMode('sword',this)">🗡</div>
<div class="mode" onclick="setMode('mace',this)">🔨</div>
<div class="mode" onclick="setMode('uhc',this)">❤️</div>
<div class="mode" onclick="setMode('netpot',this)">♟️</div>
<div class="mode" onclick="setMode('diapot',this)">💎</div>

</div>

<!-- ADMIN BUTTONS -->
<div class="admin">
<button onclick="editSelected()">Edit Tier</button>
<button onclick="removeSelected()">Remove</button>
</div>

</div>

<div class="container">

<table>

<thead>
<tr>
<th>Player</th>
<th>Name</th>
<th>Tier</th>
</tr>
</thead>

<tbody id="leaderboardBody"></tbody>

</table>

</div>

<script>

// PASSWORD
const ADMIN_PASSWORD = "Chromepassword";

let currentMode = "crystal";
let selectedPlayer = null;

let players = [
{
name:"ChromeKing",
tiers:{crystal:"",smp:"",axe:"",sword:"",mace:"",uhc:"",netpot:"",diapot:""}
},
{
name:"SkyPvP",
tiers:{crystal:"",smp:"",axe:"",sword:"",mace:"",uhc:"",netpot:"",diapot:""}
}
];

const body = document.getElementById("leaderboardBody");

// RENDER
function render(){

body.innerHTML="";

players.forEach(p=>{

let row=document.createElement("tr");

row.onclick=()=>selectPlayer(p,row);

row.innerHTML=`
<td><img src="https://mc-heads.net/avatar/${p.name}" width="30"></td>
<td>${p.name}</td>
<td>${p.tiers[currentMode] || "-"}</td>
`;

body.appendChild(row);

});

}

// SELECT PLAYER
function selectPlayer(player,row){

selectedPlayer = player;

document.querySelectorAll("tr").forEach(r=>r.classList.remove("selected"));

row.classList.add("selected");

}

// CHANGE MODE
function setMode(mode,el){

currentMode = mode;

document.querySelectorAll(".mode").forEach(m=>m.classList.remove("active"));
el.classList.add("active");

render();

}

// EDIT SELECTED
function editSelected(){

if(!selectedPlayer){
alert("Select a player first");
return;
}

let pass = prompt("Password");

if(pass !== ADMIN_PASSWORD){
alert("Wrong password");
return;
}

let tier = prompt("Enter new tier");

if(!tier) return;

selectedPlayer.tiers[currentMode] = tier;

render();

}

// REMOVE SELECTED
function removeSelected(){

if(!selectedPlayer){
alert("Select a player first");
return;
}

let pass = prompt("Password");

if(pass !== ADMIN_PASSWORD){
alert("Wrong password");
return;
}

players = players.filter(p => p !== selectedPlayer);

selectedPlayer = null;

render();

}

// INIT
render();

</script>

</body>
</html>
