<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChromeTiers</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

header{
font-size:48px;
text-align:center;
padding:20px;
font-weight:bold;

background:linear-gradient(
90deg,
#d9d9d9,
#ffffff,
#9ca3af,
#e5e7eb
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:#020617;
}

th{
background:#111827;
padding:10px;
}

td{
padding:8px;
text-align:center;
}

tr:nth-child(even){
background:#0f172a;
}

input,button{
padding:8px;
margin:5px;
border:none;
border-radius:6px;
background:#111827;
color:white;
}

button{
cursor:pointer;
background:#2563eb;
}

.admin{
margin-top:15px;
background:#020617;
padding:10px;
border:1px solid #111827;
}

.tier{
font-weight:bold;
}

</style>

</head>
<body>

<header>ChromeTiers</header>

<div class="container">

<table>

<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Tier</th>
</tr>
</thead>

<tbody id="leaderboardBody">
</tbody>

</table>


<div class="admin">

<h3>Admin Panel</h3>

<input id="playerName" placeholder="Player name">

<input id="playerTier" placeholder="Tier">

<input id="adminPass" placeholder="Password">

<br>

<button onclick="setTier()">Set Tier</button>

<button onclick="removePlayer()">Remove Player</button>

</div>

</div>


<script>


// CHANGE THIS PASSWORD
const ADMIN_PASSWORD = "chrome123";


let players = [

{name:"ChromeKing", tier:""},
{name:"SkyPvP", tier:""},
{name:"NeonSlayer", tier:""},
{name:"TitanForce", tier:""},
{name:"PhantomStrike", tier:""}

];


const body = document.getElementById("leaderboardBody");


function render(){

body.innerHTML="";

players.forEach((p,i)=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${i+1}</td>
<td>${p.name}</td>
<td class="tier">${p.tier}</td>
`;

body.appendChild(row);

});

}



function checkPass(){

let pass=document.getElementById("adminPass").value;

if(pass !== ADMIN_PASSWORD){

alert("Wrong password");

return false;

}

return true;

}



function setTier(){

if(!checkPass()) return;

let name=document.getElementById("playerName").value;
let tier=document.getElementById("playerTier").value;

players.forEach(p=>{

if(p.name.toLowerCase()==name.toLowerCase()){

p.tier=tier;

}

});

render();

}



function removePlayer(){

if(!checkPass()) return;

let name=document.getElementById("playerName").value;

players = players.filter(p =>
p.name.toLowerCase() !== name.toLowerCase()
);

render();

}



render();

</script>

</body>
</html>
