<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>

/* Base */
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* Layout section (like Tailwind bg card) */
.section{
max-width:1100px;
margin:auto;
padding:20px;
}

/* Card */
.card{
background:#0f172a;
border:1px solid #1e293b;
border-radius:12px;
padding:20px;
}

/* Header */
.header{
text-align:center;
font-size:40px;
font-weight:bold;
margin-bottom:20px;

background:linear-gradient(90deg,#d9d9d9,#ffffff,#9ca3af,#e5e7eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Row container */
.row{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
border-radius:10px;
margin-bottom:10px;
background:linear-gradient(90deg,#1e3a8a,#1d4ed8);
}

/* Left (player) */
.player{
display:flex;
align-items:center;
gap:12px;
}

/* Name */
.name{
font-size:18px;
font-weight:600;

background:linear-gradient(90deg,#ffffff,#d1d5db,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Modes */
.modes{
display:flex;
gap:10px;
}

/* Mode box */
.mode{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
}

.icon{
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
background:#111827;
}

.tier{
font-weight:bold;
background:linear-gradient(90deg,#ffffff,#d1d5db,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

img{
border-radius:6px;
}

</style>
</head>

<body>

<div class="section">

<div class="header">ChromeTiers</div>

<div class="card" id="list"></div>

</div>

<script>

const modes = [
{key:"crystal",icon:"🔮"},
{key:"smp",icon:"🛡️"},
{key:"axe",icon:"🪓"},
{key:"sword",icon:"🗡"},
{key:"mace",icon:"🔨"},
{key:"uhc",icon:"❤️"},
{key:"netpot",icon:"♟️"},
{key:"diapot",icon:"💎"}
];

let players = [
{
name:"ChromeKing",
tiers:{crystal:"HT1",smp:"HT1",axe:"LT1",sword:"HT1",mace:"HT1",uhc:"HT1",netpot:"LT1",diapot:"LT1"}
},
{
name:"SkyPvP",
tiers:{crystal:"HT2",smp:"LT1",axe:"HT2",sword:"HT1",mace:"LT1",uhc:"HT2",netpot:"HT1",diapot:"LT1"}
}
];

const container = document.getElementById("list");

function render(){

container.innerHTML="";

players.forEach(p=>{

let modesHTML = modes.map(m=>`
<div class="mode">
<div class="icon">${m.icon}</div>
<div class="tier">${p.tiers[m.key]}</div>
</div>
`).join("");

let row = document.createElement("div");

row.className="row";

row.innerHTML=`
<div class="player">
<img src="https://mc-heads.net/avatar/${p.name}" width="32">
<div class="name">${p.name}</div>
</div>

<div class="modes">${modesHTML}</div>
`;

container.appendChild(row);

});

}

render();

</script>

</body>
</html>
