<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

header{
font-size:48px;
text-align:center;
padding:20px;
font-weight:bold;
background:linear-gradient(90deg,#d9d9d9,#ffffff,#9ca3af,#e5e7eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.container{
max-width:1000px;
margin:auto;
padding:10px;
}

/* Gamemode buttons */
.modes{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:15px;
}

.modes button{
font-size:18px;
padding:10px;
border-radius:10px;
background:#111827;
border:none;
color:white;
cursor:pointer;
transition:0.2s;
}

.modes button:hover{
background:#2563eb;
}

/* Table */
table{
width:100%;
border-collapse:collapse;
background:#020617;
}

th{
background:#111827;
padding:10px;
}

td{
padding:10px;
text-align:center;
}

tr:nth-child(even){
background:#0f172a;
}

img{
border-radius:6px;
}

/* Buttons */
.action-btn{
padding:6px 10px;
margin:2px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

.action-btn:hover{
background:#1d4ed8;
}

</style>

</head>
<body>

<header>ChromeTiers</header>

<div class="container">

<!-- GAMEMODE SELECTOR -->
<div class="modes">

<button onclick="setMode('crystal')">💎</button>
<button onclick="setMode('smp')">🛡</button>
<button onclick="setMode('axe')">🪓</button>
<button onclick="setMode('sword')">⚔</button>
<button onclick="setMode('mace')">🔨</button>
<button onclick="setMode('uhc')">❤️</button>
<button onclick="setMode('netpot')">🧪</button>
<button onclick="setMode('diapot')">💠</button>

</div>

<!-- TABLE -->
<table>

<thead>
<tr>
<th>Player</th>
<th>Name</th>
<th>Tier</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="leaderboardBody">
</tbody>

</table>

</div>

<script>

// 🔐 CHANGE PASSWORD HERE
const ADMIN_PASSWORD = "chrome123";

// Current gamemode
let currentMode = "crystal";

// Player data
let players = [

{
name:"ChromeKing",
tiers:{
crystal:"",smp:"",axe:"",sword:"",mace:"",uhc:"",netpot:"",diapot:""
}
},

{
name:"SkyPvP",
tiers:{
crystal:"",smp:"",axe:"",sword:"",mace:"",uhc:"",netpot:"",diapot:""
}
}

];

// DOM
const body = document.getElementById("leaderboardBody");

// Render leaderboard
function render(){

body.innerHTML="";

players.forEach(p=>{

let tier = p.tiers[currentMode];

let row=document.createElement("tr");

row.innerHTML=`

<td>
<img src="https://mc-heads.net/avatar/${p.name}" width="30">
</td>

<td>${p.name}</td>

<td>${tier || "-"}</td>

<td>
<button class="action-btn" onclick="editTier('${p.name}')">Edit</button>
<button class="action-btn" onclick="removePlayer('${p.name}')">Remove</button>
</td>

`;

body.appendChild(row);

});

}

// Switch gamemode
function setMode(mode){

currentMode = mode;

render();

}

// Edit tier
function editTier(name){

let pass = prompt("Enter password");

if(pass !== ADMIN_PASSWORD){
alert("Wrong password");
return;
}

let tier = prompt("Enter new tier");

if(!tier) return;

players.forEach(p=>{

if(p.name === name){

p.tiers[currentMode] = tier;

}

});

render();

}

// Remove player
function removePlayer(name){

let pass = prompt("Enter password");

if(pass !== ADMIN_PASSWORD){
alert("Wrong password");
return;
}

players = players.filter(p => p.name !== name);

render();

}

// Initial render
render();

</script>

</body>
</html>
