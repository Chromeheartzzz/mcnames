<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromeTiers</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b1220,#020617);
color:white;
}

/* HEADER BLENDS WITH BACKGROUND */
header{
font-size:48px;
text-align:center;
padding:20px;
font-weight:bold;

background:linear-gradient(90deg,#d9d9d9,#ffffff,#9ca3af,#e5e7eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TOP BAR (NOW SAME COLOR AS BACKGROUND) */
.topbar{
display:flex;
justify-content:flex-end;
padding:10px 20px;
background:transparent; /* 👈 removed box look */
}

/* ADMIN */
.admin{
display:none;
}

.admin button{
margin-left:5px;
padding:6px 10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* TABLE */
.container{
max-width:1000px;
margin:auto;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th{
background:#1e293b;
padding:12px;
text-align:left;
}

td{
padding:14px;
}

/* ROW STYLE */
tbody tr{
background:linear-gradient(90deg,#1e3a8a,#1d4ed8);
}

tbody tr:nth-child(even){
background:linear-gradient(90deg,#1e40af,#1e3a8a);
}

tr:hover{
filter:brightness(1.1);
}

/* NAME */
.name{
padding-left:22px;
font-size:20px;
font-weight:600;

background:linear-gradient(90deg,#ffffff,#d1d5db,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* MODES */
.mode-cell{
display:flex;
justify-content:center;
gap:14px;
}

.mode-box{
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
}

.mode-icon{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:#111827;
}

/* TIER */
.tier-text{
font-size:14px;
font-weight:700;

background:linear-gradient(90deg,#ffffff,#d1d5db,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* DRAG */
.dragging{
opacity:0.5;
}

.selected{
outline:2px solid #2563eb;
}

img{
border-radius:6px;
}

</style>
</head>

<body>

<header>ChromeTiers</header>

<div class="topbar">

<div class="admin" id="adminPanel">
<button onclick="addPlayer()">Add Player</button>
<button onclick="editSelected()">Edit Tier</button>
<button onclick="removeSelected()">Remove</button>
</div>

<button onclick="unlockAdmin()">Admin</button>

</div>

<div class="container">

<table>

<thead>
<tr>
<th>Player</th>
<th>Name</th>
<th style="text-align:center;">Gamemode Tiers</th>
</tr>
</thead>

<tbody id="leaderboardBody"></tbody>

</table>

</div>

<script>

const ADMIN_PASSWORD = "Chromepassword";
let isAdmin = false;
let selectedPlayer = null;

const modes = [
{key:"crystal",icon:"🔮"},
{key:"smp",icon:"🛡️"},
{key:"axe",icon:"🪓"},
{key:"sword",icon:"🗡"},
{key:"mace",icon:"🔨"},
{key:"uhc",icon:"❤️"},
{key:"netpot",icon:"♟️"},
{key:"diapot",icon:"💎"}
];

let players = [
{
name:"ChromeKing",
tiers:{crystal:"HT1",smp:"HT1",axe:"LT1",sword:"HT1",mace:"HT1",uhc:"HT1",netpot:"LT1",diapot:"LT1"}
},
{
name:"SkyPvP",
tiers:{crystal:"HT2",smp:"LT1",axe:"HT2",sword:"HT1",mace:"LT1",uhc:"HT2",netpot:"HT1",diapot:"LT1"}
}
];

const body = document.getElementById("leaderboardBody");

// ADMIN LOGIN
function unlockAdmin(){
let pass = prompt("Enter admin password");
if(pass === ADMIN_PASSWORD){
isAdmin = true;
document.getElementById("adminPanel").style.display="block";
render();
alert("Admin unlocked");
}
}

// ADD PLAYER
function addPlayer(){

if(!isAdmin) return;

let name = prompt("Enter player name");
if(!name) return;

let newPlayer = {
name: name,
tiers: {}
};

modes.forEach(m=>{
newPlayer.tiers[m.key] = "";
});

players.push(newPlayer);

render();

}

// RENDER
function render(){

body.innerHTML="";

players.forEach(p=>{

let row=document.createElement("tr");

row.onclick=()=>selectPlayer(p,row);

if(isAdmin){
row.draggable=true;

row.ondragstart=()=>row.classList.add("dragging");

row.ondragend=()=>{
row.classList.remove("dragging");
updateOrder();
};

row.ondragover=(e)=>{
e.preventDefault();
const dragging=document.querySelector(".dragging");
if(dragging && dragging!==row){
body.insertBefore(dragging,row);
}
};
}

let modesHTML = modes.map(m=>`
<div class="mode-box">
<div class="mode-icon">${m.icon}</div>
<div class="tier-text">${p.tiers[m.key] || "-"}</div>
</div>
`).join("");

row.innerHTML=`
<td><img src="https://mc-heads.net/avatar/${p.name}" width="34"></td>
<td class="name">${p.name}</td>
<td><div class="mode-cell">${modesHTML}</div></td>
`;

body.appendChild(row);

});

}

// ORDER
function updateOrder(){
let newOrder=[];
document.querySelectorAll("#leaderboardBody tr").forEach(row=>{
let name=row.children[1].textContent;
let player=players.find(p=>p.name===name);
if(player)newOrder.push(player);
});
players=newOrder;
}

// SELECT
function selectPlayer(player,row){
selectedPlayer=player;
document.querySelectorAll("tr").forEach(r=>r.classList.remove("selected"));
row.classList.add("selected");
}

// EDIT
function editSelected(){
if(!isAdmin || !selectedPlayer) return;

let mode=prompt("Gamemode");
let tier=prompt("Tier");

if(!mode||!tier)return;

selectedPlayer.tiers[mode]=tier;
render();
}

// REMOVE
function removeSelected(){
if(!isAdmin || !selectedPlayer) return;

players=players.filter(p=>p!==selectedPlayer);
selectedPlayer=null;
render();
}

render();

</script>

</body>
</html>
